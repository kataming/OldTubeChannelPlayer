name: OldTubeChannelPlayer

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  OldTubeChannelPlayer:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - Services
      - ViewModels
      - Views
      - path: Resources
        # Config.plist / Config.example.plist などをバンドルリソースとして含める
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.example.OldTubeChannelPlayer
        TARGETED_DEVICE_FAMILY: "1"          # iPhone のみ
        INFOPLIST_KEY_CFBundleDisplayName: OldTube
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  OldTubeChannelPlayerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: OldTubeChannelPlayer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.example.OldTubeChannelPlayerTests

schemes:
  OldTubeChannelPlayer:
    build:
      targets:
        OldTubeChannelPlayer: all
        OldTubeChannelPlayerTests: [test]
    test:
      targets:
        - OldTubeChannelPlayerTests
