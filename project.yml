name: ChannelTimelineViewer

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # === 現状はシミュレーター/CIビルド専用（署名なし）。App Store提出設定はまだ入れない ===
    # Apple Developer Program 加入後に、ここを差し替えるだけで提出準備に移行できる:
    #   DEVELOPMENT_TEAM        : 自分のTeam ID(10桁)に変更
    #   PRODUCT_BUNDLE_IDENTIFIER: 下のターゲット設定で com.example を自分の逆ドメインに変更
    # それまでは DEVELOPMENT_TEAM は空、署名は CODE_SIGNING_ALLOWED=NO(CI)で回避する。
    DEVELOPMENT_TEAM: ""

targets:
  ChannelTimelineViewer:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - Services
      - ViewModels
      - Views
      - path: Resources
        # Config.plist / Config.example.plist などをバンドルリソースとして含める
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # ↓ App Store 提出時は com.example を自分の Apple Developer の逆ドメインに置き換える
        PRODUCT_BUNDLE_IDENTIFIER: com.example.channeltimelineviewer
        TARGETED_DEVICE_FAMILY: "1"          # iPhone のみ
        # アセットカタログ(Resources/Assets.xcassets)のアイコン/アクセントカラーを使用
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "Channel Timeline Viewer"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  ChannelTimelineViewerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: ChannelTimelineViewer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.example.channeltimelineviewer.tests

schemes:
  ChannelTimelineViewer:
    build:
      targets:
        ChannelTimelineViewer: all
        ChannelTimelineViewerTests: [test]
    test:
      targets:
        - ChannelTimelineViewerTests
