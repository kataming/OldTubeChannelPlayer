name: iOS Build

# 目的: まず xcodebuild の Debug ビルドが macOS ランナー上で通ることを確認する。
# App Store / 実機配布・署名は不要。シミュレーター向けのコンパイル確認とテストのみ。

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:   # GitHub の Actions タブから手動実行も可能

jobs:
  build:
    name: Build & Test (iOS Simulator, Debug)
    runs-on: macos-14   # Xcode 15.x / iOS 17 SDK を含む macOS ランナー

    env:
      PROJECT: OldTubeChannelPlayer.xcodeproj
      SCHEME: OldTubeChannelPlayer
      # テスト用のシミュレーター（存在しない場合は下の「Show available simulators」のログを見て調整）
      TEST_DESTINATION: 'platform=iOS Simulator,name=iPhone 15'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Prepare Config.plist (CI ダミーキー)
        run: |
          cp Resources/Config.example.plist Resources/Config.plist
          /usr/libexec/PlistBuddy -c "Set :YOUTUBE_API_KEY CI_DUMMY_KEY_FOR_BUILD" Resources/Config.plist
          echo "--- Config.plist ---"
          /usr/libexec/PlistBuddy -c "Print" Resources/Config.plist

      - name: Show available simulators (デバッグ用)
        run: xcrun simctl list devices available | sed -n '1,60p'

      # 最優先: Debug ビルドが通るか（コンパイル確認）。署名なし・シミュレーター向け。
      - name: Build (Debug, simulator, no code signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      # 可能ならユニットテストも実行（具体的なシミュレーターが必要）。
      - name: Test (unit tests on simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "$TEST_DESTINATION" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test
